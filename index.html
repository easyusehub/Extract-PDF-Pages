<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗂️ Extract PDF Pages | EasyUseHub</title>
<style>
body, html { font-family:'Segoe UI',sans-serif; background:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { width:90%; max-width:700px; padding:25px; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.1); text-align:center; }
h2{margin-bottom:10px;color:#1e293b;}
p.description{color:#475569;font-size:0.95rem;margin-bottom:20px;line-height:1.6;letter-spacing:0.5px;font-style:italic;}
.upload{padding:25px;border:3px dashed #9333ea;border-radius:15px;cursor:pointer;margin-bottom:12px;font-weight:600;color:#9333ea;transition:0.3s;}
.upload:hover{background:#f5e6fa;transform:scale(1.03);}
#pages-container{display:flex; flex-wrap:wrap; gap:10px; margin-top:15px; justify-content:center;}
.page-box{width:50px; height:60px; border:2px solid #ccc; border-radius:8px; display:flex; justify-content:center; align-items:center; cursor:pointer; user-select:none; background:#f9f9f9;}
.page-box.selected{border-color:#9333ea; background:#ede6fa; font-weight:600;}
button{padding:12px 18px; border:none; border-radius:10px; font-weight:600; cursor:pointer; margin:10px 3px; background:#9333ea; color:#fff; transition:0.3s;}
button:hover{background:#7e22ce;}
#download-btn{display:none; background:#2563eb;}
#download-btn:hover{background:#1e40af;}
#status{margin-top:10px; color:#475569;}
.bottom-buttons{display:flex;justify-content:center;gap:12px;margin-top:20px;}
.bottom-buttons a{text-decoration:none;padding:10px 16px;border-radius:8px;background:#1e293b;color:#fff;font-weight:600;}
.bottom-buttons a:hover{background:#3b82f6;}
.ad-placeholder{margin:15px 0;padding:15px;border:2px dashed #ccc;border-radius:10px;color:#999;font-size:0.9rem;text-align:center;}
</style>
</head>
<body>

<div class="container">
<h2>🗂️ Extract PDF Pages</h2>
<p class="description">Select pages from your PDF to extract. Client-side, no API needed.</p>

<div class="ad-placeholder">Ad Placeholder</div>

<div class="upload" onclick="document.getElementById('file').click()">📁 Upload PDF</div>
<input type="file" id="file" accept="application/pdf" hidden>

<div id="pages-container"></div>

<button id="extract-btn">Extract Selected Pages</button>
<button id="download-btn">📥 Download PDF</button>
<p id="status">No file selected</p>

<div class="bottom-buttons">
<a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" target="_blank">📂 All PDF Tools</a>
<a href="https://easyusehub.blogspot.com/?m=1" target="_blank">🏠 Home</a>
</div>

<div class="ad-placeholder">Ad Placeholder</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
let file=null;
let pdfDoc=null;
let selectedPages=[];

document.getElementById('file').addEventListener('change',async e=>{
    file=e.target.files[0];
    if(!file) return;
    if(file.size>30*1024*1024){alert('Max 30MB'); return;}
    document.getElementById('status').textContent=`✔ ${file.name} selected`;
    
    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
    
    const container = document.getElementById('pages-container');
    container.innerHTML='';
    selectedPages=[];
    for(let i=0;i<pdfDoc.getPageCount();i++){
        const box=document.createElement('div');
        box.className='page-box';
        box.textContent=i+1;
        box.onclick=()=>{ 
            box.classList.toggle('selected');
            if(selectedPages.includes(i)) selectedPages=selectedPages.filter(p=>p!==i);
            else selectedPages.push(i);
        };
        container.appendChild(box);
    }
});

document.getElementById('extract-btn').addEventListener('click',async ()=>{
    if(!file){alert('Upload PDF first'); return;}
    if(selectedPages.length===0){alert('Select at least one page'); return;}
    document.getElementById('status').textContent='Extracting pages...';
    
    const newPdf = await PDFLib.PDFDocument.create();
    for(const i of selectedPages){
        const [copied] = await newPdf.copyPages(pdfDoc,[i]);
        newPdf.addPage(copied);
    }
    const pdfBytes = await newPdf.save();
    const blob = new Blob([pdfBytes],{type:'application/pdf'});
    const url = URL.createObjectURL(blob);
    
    const downloadBtn=document.getElementById('download-btn');
    downloadBtn.style.display='block';
    downloadBtn.onclick=()=>{ const a=document.createElement('a'); a.href=url; a.download=file.name.replace(/\.pdf$/i,'-extracted.pdf'); a.click(); };
    document.getElementById('status').textContent='✔ Pages extracted! Download your PDF.';
});
</script>

</body>
</html>
